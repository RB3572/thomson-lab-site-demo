<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Kalam:wght@300;400;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="A demo research lab website scaffold for the Thomson Lab."
    />
    <title>Thomson Lab Site Demo</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Apply the saved theme before paint to avoid a flash of the wrong theme.
      try {
        if (localStorage.getItem('theme') === 'light') {
          document.documentElement.classList.add('light')
        }
      } catch (e) {}
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
